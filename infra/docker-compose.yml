services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fund-api
    env_file:
      - ../backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: fund-db
    environment:
      POSTGRES_DB: leaf
      POSTGRES_USER: leaf
      POSTGRES_PASSWORD: leaf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fund-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
